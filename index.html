<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveTracker | ENGO 551 Lab 5</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="../static/styles/styles.css" />
</head>
<body>
    <div id="locationGate" class="location-gate">
        <div class="location-card">
            <h2>Enable Live Location</h2>
            <p>
                LiveTracker needs your location permission to start the app.
            </p>
            <button id="enableLocationBtn">Allow Location</button>
        </div>
    </div>

    <div class="page-overlay">
        <main class="app-shell">
            <section class="hero-only">
                <h1>LiveTracker</h1>
                <p>Showing your location and temperature to others</p>
            </section>

            <button id="shareStatusBtn" class="share-btn">Share My Status</button>

            <section class="map-wrapper">
                <div id="map"></div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../static/js/main.js"></script>
</body>
</html>
